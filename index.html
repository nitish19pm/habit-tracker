<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent-light: #a89cff;
      --accent-glow: rgba(124, 106, 247, 0.18);
      --success: #4ade80;
      --success-bg: rgba(74, 222, 128, 0.12);
      --danger: #f87171;
      --text: #e8e8f0;
      --text-muted: #888899;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 0 0 80px;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 15, 19, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }

    .header-inner {
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span { color: var(--accent-light); }

    .date-pill {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 999px;
    }

    /* Main */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 0;
    }

    /* Summary bar */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Section heading */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* Add habit */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .add-form input::placeholder { color: var(--text-muted); }
    .add-form input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .btn-add:hover { background: var(--accent-light); }
    .btn-add:active { transform: scale(0.94); }

    /* Habit list */
    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.5; }

    /* Habit card */
    .habit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .habit-card.done {
      background: var(--success-bg);
      border-color: rgba(74, 222, 128, 0.25);
    }

    .habit-card.done::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--success);
      border-radius: 0 2px 2px 0;
    }

    /* Checkbox */
    .check-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
      color: transparent;
      font-size: 0.85rem;
    }

    .check-btn:hover { border-color: var(--success); }

    .habit-card.done .check-btn {
      background: var(--success);
      border-color: var(--success);
      color: #0f0f13;
    }

    /* Habit info */
    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .habit-card.done .habit-name {
      color: var(--text-muted);
      text-decoration: line-through;
      text-decoration-color: rgba(136,136,153,0.5);
    }

    .habit-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 3px;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .streak-badge.hot {
      color: #fbbf24;
    }

    .streak-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
      display: inline-block;
    }

    /* Mini week dots */
    .week-dots {
      display: flex;
      gap: 3px;
    }

    .week-dot {
      width: 7px;
      height: 7px;
      border-radius: 2px;
      background: var(--border);
    }

    .week-dot.filled { background: var(--accent); }
    .week-dot.today-done { background: var(--success); }

    /* Delete btn */
    .btn-delete {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      font-size: 0.9rem;
      opacity: 0.4;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .habit-card:hover .btn-delete { opacity: 1; }
    .btn-delete:hover { color: var(--danger); }

    /* Progress ring in summary */
    .progress-ring-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .progress-ring { transform: rotate(-90deg); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .summary { gap: 8px; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">habit<span>.</span></div>
    <div class="date-pill" id="date-display"></div>
  </div>
</header>

<main>
  <div class="summary">
    <div class="stat-card">
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-label">Done today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total habits</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-best">0</div>
      <div class="stat-label">Best streak</div>
    </div>
  </div>

  <div class="section-head">
    <div class="section-title">Today's habits</div>
  </div>

  <div class="add-form">
    <input
      type="text"
      id="new-habit-input"
      placeholder="Add a new habit…"
      maxlength="60"
      autocomplete="off"
    />
    <button class="btn-add" id="add-btn" aria-label="Add habit">+</button>
  </div>

  <div class="habits-list" id="habits-list"></div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────

  const STORAGE_KEY = 'habittracker_v1';

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch {}
    return { habits: [] };
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let data = loadData();

  // ─── Streak helpers ──────────────────────────────────────────────────────────

  function calcStreak(habit) {
    let streak = 0;
    const today = todayStr();
    const d = new Date();

    for (let i = 0; i < 365; i++) {
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      // For today: only count if checked. For past: check completions.
      if (key === today) {
        if (habit.completions[key]) streak++;
        // If today isn't checked yet, don't break — streak may continue from yesterday
        d.setDate(d.getDate() - 1);
        continue;
      }
      if (habit.completions[key]) {
        streak++;
      } else {
        break;
      }
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function bestStreak(habit) {
    // Find longest streak across all time
    const dates = Object.keys(habit.completions).filter(k => habit.completions[k]).sort();
    if (!dates.length) return 0;

    let best = 1, cur = 1;
    for (let i = 1; i < dates.length; i++) {
      const prev = new Date(dates[i-1]);
      const curr = new Date(dates[i]);
      const diff = (curr - prev) / 86400000;
      if (diff === 1) { cur++; best = Math.max(best, cur); }
      else cur = 1;
    }
    return best;
  }

  function getLast7Days() {
    const days = [];
    const d = new Date();
    for (let i = 6; i >= 0; i--) {
      const dd = new Date(d);
      dd.setDate(dd.getDate() - i);
      days.push(`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`);
    }
    return days;
  }

  // ─── Render ──────────────────────────────────────────────────────────────────

  function render() {
    const today = todayStr();
    const list = document.getElementById('habits-list');
    const last7 = getLast7Days();

    // Summary
    const total = data.habits.length;
    const done = data.habits.filter(h => h.completions[today]).length;
    const allBest = data.habits.reduce((mx, h) => Math.max(mx, bestStreak(h)), 0);

    document.getElementById('stat-done').textContent = `${done}/${total}`;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-best').textContent = allBest;

    // List
    if (!data.habits.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">🌱</div>
          <p>No habits yet.<br>Add one above to get started.</p>
        </div>`;
      return;
    }

    list.innerHTML = '';

    data.habits.forEach((habit, idx) => {
      const isDone = !!habit.completions[today];
      const streak = calcStreak(habit);
      const card = document.createElement('div');
      card.className = `habit-card${isDone ? ' done' : ''}`;

      const weekDots = last7.map(d => {
        const isToday = d === today;
        const filled = !!habit.completions[d];
        let cls = 'week-dot';
        if (filled && isToday) cls += ' today-done';
        else if (filled) cls += ' filled';
        return `<div class="${cls}" title="${d}"></div>`;
      }).join('');

      const isHot = streak >= 3;

      card.innerHTML = `
        <button class="check-btn" data-idx="${idx}" aria-label="${isDone ? 'Uncheck' : 'Check'} ${habit.name}">
          ${isDone ? '✓' : ''}
        </button>
        <div class="habit-info">
          <div class="habit-name">${escapeHtml(habit.name)}</div>
          <div class="habit-meta">
            <span class="streak-badge ${isHot ? 'hot' : ''}">
              ${isHot ? '🔥' : '○'} ${streak} day${streak !== 1 ? 's' : ''}
            </span>
            <span class="streak-dot"></span>
            <div class="week-dots">${weekDots}</div>
          </div>
        </div>
        <button class="btn-delete" data-idx="${idx}" aria-label="Delete ${habit.name}">✕</button>
      `;

      list.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Actions ─────────────────────────────────────────────────────────────────

  function addHabit(name) {
    name = name.trim();
    if (!name) return;
    if (data.habits.some(h => h.name.toLowerCase() === name.toLowerCase())) {
      showToast('Habit already exists');
      return;
    }
    data.habits.push({ name, completions: {}, createdAt: todayStr() });
    saveData(data);
    render();
  }

  function toggleHabit(idx) {
    const today = todayStr();
    const habit = data.habits[idx];
    if (!habit) return;
    habit.completions[today] = !habit.completions[today];
    saveData(data);
    render();
    if (habit.completions[today]) {
      const streak = calcStreak(habit);
      showToast(streak >= 3 ? `🔥 ${streak} day streak!` : '✓ Habit checked off');
    }
  }

  function deleteHabit(idx) {
    const name = data.habits[idx]?.name;
    data.habits.splice(idx, 1);
    saveData(data);
    render();
    if (name) showToast(`Deleted "${name}"`);
  }

  // ─── Toast ───────────────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ─── Date display ─────────────────────────────────────────────────────────────

  function updateDate() {
    const el = document.getElementById('date-display');
    const d = new Date();
    el.textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // ─── Event listeners ─────────────────────────────────────────────────────────

  document.getElementById('add-btn').addEventListener('click', () => {
    const input = document.getElementById('new-habit-input');
    addHabit(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('new-habit-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addHabit(e.target.value);
      e.target.value = '';
    }
  });

  document.getElementById('habits-list').addEventListener('click', e => {
    const checkBtn = e.target.closest('.check-btn');
    const deleteBtn = e.target.closest('.btn-delete');
    if (checkBtn) toggleHabit(Number(checkBtn.dataset.idx));
    if (deleteBtn) deleteHabit(Number(deleteBtn.dataset.idx));
  });

  // ─── Init ─────────────────────────────────────────────────────────────────────

  updateDate();
  render();

  // Refresh date at midnight
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
  setTimeout(() => { updateDate(); render(); }, msToMidnight);
</script>
</body>
</html>
